<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brochure Collection | Hopesama</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
    <style>
        .book-section { display: flex; justify-content: center; align-items: center; padding: 20px 0 60px; overflow: hidden; }
        .flip-book { box-shadow: 0 15px 30px rgba(0,0,0,0.15); margin: 0 auto; display: none; }
        .page { padding: 0; background-color: #ffffff; overflow: hidden; }
        .page-content { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .page img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .book-controls { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .book-btn { background: var(--text-color); color: var(--bg-color); border: none; padding: 8px 24px; border-radius: 30px; cursor: pointer; font-size: 0.9rem; transition: opacity 0.2s; }
        .book-btn:hover { opacity: 0.8; }
        body.dark-mode .page { background-color: #1a1a1a; }
    </style>
</head>
<body>
    <div class="cursor-dot" data-cursor-dot></div><div class="cursor-outline" data-cursor-outline></div>
    <div id="app-header"></div>
    <main>
        <section class="detail-hero"><div class="container"><div class="col-12"><h1 class="text-display fade-in">Brochure<br>Collection</h1><div class="detail-meta fade-in"><div><span class="text-label">Format</span><br>Interactive Flipbook</div><div><span class="text-label">Size</span><br>A4 Vertical</div><div><span class="text-label">Year</span><br>2024</div></div></div></div></section>
        <section class="container fade-up">
            <div class="col-12 book-section">
                <div id="book" class="flip-book">
                    <div class="page" data-density="hard"><div class="page-content"><img src="images/bro1.jpg" alt="1"></div></div>
                    <div class="page"><div class="page-content"><img src="images/bro2.jpg" alt="2"></div></div>
                    <div class="page"><div class="page-content"><img src="images/bro3.jpg" alt="2"></div></div>
                    <div class="page"><div class="page-content"><img src="images/bro4.jpg" alt="4"></div></div>
                    <div class="page"><div class="page-content"><img src="images/bro5.jpg" alt="5"></div></div>
                    <div class="page"><div class="page-content"><img src="images/bro6.jpg" alt="6"></div></div>
                    <div class="page"><div class="page-content"><img src="images/bro7.jpg" alt="7"></div></div>
                    <div class="page" data-density="hard"><div class="page-content"><img src="images/bro8.jpg" alt="8"></div></div>
                </div>
            </div>
            <div class="col-12 book-controls fade-up"><button class="book-btn" id="prevBtn">← Previous</button><button class="book-btn" id="nextBtn">Next →</button></div>
            <div class="col-8" style="margin: 20px auto; text-align: center;"><p class="text-body" style="font-size: 0.9rem; opacity: 0.7;">(Kéo góc trang giấy để lật)</p></div>
        </section>
        <section class="container" style="margin-top: 80px; padding-top: 40px; border-top: 1px solid var(--border-color); text-align: center;"><span class="text-label">Next Project</span><h3><a href="project-bidv.html" class="text-display" style="font-size: 2rem;">BIDV Metlife &rarr;</a></h3></section>
    </main>
    <div id="app-footer"></div>
    <script src="main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded",()=>{
            const e=new St.PageFlip(document.getElementById("book"),{width:400,height:566,size:"fixed",minWidth:300,maxWidth:1000,minHeight:424,maxHeight:1414,maxShadowOpacity:.5,showCover:!0,mobileScrollSupport:!1});
            e.loadFromHTML(document.querySelectorAll(".page")),document.querySelector(".flip-book").style.display="block";
            document.getElementById("prevBtn").addEventListener("click",()=>{e.flipPrev()});
            document.getElementById("nextBtn").addEventListener("click",()=>{e.flipNext()});
        });
    </script>
</body>
</html>
