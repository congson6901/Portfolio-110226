<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Liên hệ với Hopesama để hợp tác dự án.">
    <meta name="theme-color" content="#ffffff">
    <title>Contact | Hopesama</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
</head>
<body>
    <div class="cursor-dot" data-cursor-dot></div><div class="cursor-outline" data-cursor-outline></div>
    
    <div id="app-header"></div>

    <main>
        <section class="contact-hero">
            <div class="container">
                <div class="col-6 fade-in">
                    <h1 class="text-display">Let's work<br>together.</h1>
                    <p class="text-body" style="margin-top: 20px;">Đừng ngần ngại chia sẻ ý tưởng của bạn.</p>
                    <div style="margin-top: 40px;">
                        <a href="mailto:congsondesigner@gmail.com" style="font-size: 1.5rem; border-bottom: 1px solid currentColor;">congsondesigner@gmail.com</a>
                    </div>
                </div>

                <div class="col-6 fade-in">
                    <form id="contact-form" class="contact-form" action="https://formspree.io/f/xnjppqkp" method="POST">
                        <div class="form-group">
                            <input type="text" name="name" placeholder="Tên của bạn" required>
                        </div>
                        <div class="form-group">
                            <input type="email" name="email" placeholder="Email của bạn" required>
                        </div>
                        <div class="form-group">
                            <textarea name="message" rows="4" placeholder="Nội dung dự án..." required></textarea>
                        </div>
                        
                        <button type="submit" id="submit-btn" class="submit-btn">Gửi tin nhắn</button>
                        <p id="form-status" style="margin-top: 15px; font-size: 0.9rem; color: var(--secondary-color);"></p>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="app-footer"></div>

    <script src="main.js"></script>
</body>
</html>
