<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion & Animation | Hopesama</title>
    <meta name="description" content="Các dự án Motion Graphics vuông và dọc do Hopesama thực hiện.">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
</head>
<body>
    <div class="cursor-dot" data-cursor-dot></div><div class="cursor-outline" data-cursor-outline></div>
    
    <div id="app-header"></div>

    <main>
        <section class="detail-hero">
            <div class="container">
                <div class="col-12">
                    <h1 class="text-display fade-in">Motion<br>Graphics.</h1>
                    <p class="text-body fade-in" style="margin-top: 20px; font-size: 1.2rem;">Tuyển tập các dự án chuyển động đa định dạng (Square & Vertical).</p>
                </div>
            </div>
        </section>

        <section class="container fade-up" style="margin-bottom: 120px;">
            <div class="col-12">
                <div class="animation-masonry">
                    
                    <div class="animation-item">
                        <video src="images/video1.mp4" autoplay loop muted playsinline controls></video>
                    </div>

                    <div class="animation-item">
                        <video src="images/video2.mp4" autoplay loop muted playsinline controls></video>
                    </div>

                    <div class="animation-item">
                        <video src="images/video3.mp4" autoplay loop muted playsinline controls></video>
                    </div>

                    <div class="animation-item">
                        <video src="images/video4.mp4" autoplay loop muted playsinline controls></video>
                    </div>

                    <div class="animation-item">
                        <video src="images/video5.mp4" autoplay loop muted playsinline controls></video>
                    </div>

                    <div class="animation-item">
                        <video src="images/video6.mp4" autoplay loop muted playsinline controls></video>
                    </div> 

                    <div class="animation-item">
                        <video src="images/video7.mp4" autoplay loop muted playsinline controls></video>
                    </div>

                    <div class="animation-item">
                        <video src="images/video8.mp4" autoplay loop muted playsinline controls></video>
                    </div>

                    <div class="animation-item">
                        <video src="images/video9.mp4" autoplay loop muted playsinline controls></video>
                    </div>

                    <div class="animation-item">
                        <video src="images/video10.mp4" autoplay loop muted playsinline controls></video>
                    </div>

                    

                </div>
            </div>
        </section>
    </main>

    <div id="app-footer"></div>

    <script src="main.js"></script>
</body>
</html>
